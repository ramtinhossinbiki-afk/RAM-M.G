<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RAM C | بازی حافظه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', 'Vazir', system-ui, sans-serif;
        }

        body {
            background: #fffef7;
            padding: 2rem 1.2rem;
            color: #2d3e50;
        }

        .card {
            background: #ffffff;
            border-radius: 1.75rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(255,200,100,0.1);
            border: 1px solid #fff0d6;
            overflow: hidden;
        }

        .btn {
            background: #fffcf5;
            border: 1px solid #ffe2b5;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            color: #b97f2e;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #f9e0a0;
            border: none;
            color: #784a0e;
            box-shadow: 0 2px 4px rgba(249,200,100,0.2);
        }

        .btn-primary:hover {
            background: #f7d97e;
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #bfae95;
            border-top: 1px solid #fff0e2;
            padding-top: 1rem;
        }

        h1 {
            font-weight: 700;
            color: #c8821f;
        }

        /* استایل‌های بازی حافظه با تم RAM C */
        .game-container {
            max-width: 600px;
            margin: 0 auto;
            user-select: none;
        }

        .mode-selector, .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .mode-btn, .diff-btn {
            padding: 0.45rem 1rem;
            border: 2px solid #ffe2bc;
            border-radius: 2rem;
            background: #ffffff;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #b97f2e;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .mode-btn.active, .diff-btn.active {
            background: #f9e0a0;
            color: #784a0e;
            border-color: #f9e0a0;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #fefcf7;
            border: 2px solid #fff0df;
            border-radius: 0.75rem;
            padding: 0.4rem 1rem;
            text-align: center;
            min-width: 80px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2d3e50;
        }

        .players-bar {
            display: none;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .players-bar.show {
            display: flex;
        }

        .player-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.75rem;
            border: 2px solid #ffe2bc;
            background: #fefcf7;
        }

        .player-box.active-turn {
            border-color: #e5a12e;
            background: #fffaf0;
        }

        .player-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #2d3e50;
            cursor: text;
            border-bottom: 1px dashed #bfae95;
            outline: none;
            max-width: 80px;
        }

        .player-score {
            font-size: 1rem;
            font-weight: 700;
            color: #e5a12e;
        }

        .card-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .grid-4x3 { grid-template-columns: repeat(4, 1fr); }
        .grid-4x4 { grid-template-columns: repeat(4, 1fr); }
        .grid-5x4 { grid-template-columns: repeat(5, 1fr); }

        .memory-card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
            transform: perspective(800px) rotateY(0deg);
        }

        .memory-card.flipped, .memory-card.matched {
            transform: perspective(800px) rotateY(180deg);
        }

        [dir="rtl"] .memory-card.flipped,
        [dir="rtl"] .memory-card.matched {
            transform: perspective(800px) rotateY(-180deg);
        }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            border-radius: 0.75rem;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffe2bc;
            background: #ffffff;
        }

        .card-back {
            background: linear-gradient(135deg, #f9e0a0, #f5cd8a);
            z-index: 2;
        }

        .card-back svg {
            width: 40%;
            height: 40%;
            color: #784a0e;
        }

        .card-front {
            transform: rotateY(180deg);
            background: #fefcf7;
            flex-direction: column;
            gap: 4px;
        }

        [dir="rtl"] .card-front {
            transform: rotateY(-180deg);
        }

        .card-front svg {
            width: 36%;
            height: 36%;
            color: #e5a12e;
        }

        .card-front .card-name {
            font-size: 0.55rem;
            font-weight: 700;
            color: #15803d;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .control-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 2px solid #ffe2bc;
            border-radius: 2rem;
            background: #ffffff;
            font-weight: 600;
            cursor: pointer;
            color: #b97f2e;
        }

        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,254,247,0.9);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 200;
        }

        .win-overlay.show {
            display: flex;
        }

        .win-title {
            font-size: 2rem;
            font-weight: 700;
            color: #e5a12e;
            margin-bottom: 0.5rem;
        }

        .win-btn {
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: #f9e0a0;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            color: #784a0e;
        }

        @media (max-width: 480px) {
            .card-grid { gap: 6px; }
            .card-front svg { width: 30%; }
            .card-front .card-name { font-size: 0.4rem; }
            .stat-box { padding: 0.2rem 0.5rem; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="card" style="padding: 1.8rem 1.5rem;">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1rem;">
        <div>
            <h1>RAM M.G</h1>
            <span style="font-size:0.7rem; color:#cc9a5c;">RAMTIN MEMMORY GAME · بازی حافظه</span>
        </div>
        <div>
            <a href="https://github.com/ramtinhossinbiki" target="_blank" style="text-decoration: none;">
                <button class="btn" style="background:#f5f0e8;">🐙 گیت‌هاب</button>
            </a>
        </div>
    </div>

    <div class="game-container">
        <div class="mode-selector">
            <button class="mode-btn" data-mode="1p">🎮 ۱ نفره</button>
            <button class="mode-btn active" data-mode="2p">👥 ۲ نفره</button>
        </div>
        <div class="difficulty-selector">
            <button class="diff-btn" data-diff="easy">آسان</button>
            <button class="diff-btn" data-diff="medium">متوسط</button>
            <button class="diff-btn active" data-diff="hard">سخت</button>
        </div>
        <div class="players-bar show" id="playersBar">
            <div class="player-box active-turn" id="player1Box">
                <span class="player-name" id="player1Name" contenteditable="true">بازیکن ۱</span>
                <span class="player-score" id="player1Score">۰/۱۰</span>
            </div>
            <div class="player-box" id="player2Box">
                <span class="player-name" id="player2Name" contenteditable="true">بازیکن ۲</span>
                <span class="player-score" id="player2Score">۰/۱۰</span>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat-box"><div class="stat-label">جفت</div><div class="stat-value" id="pairsCount">۰/۱۰</div></div>
            <div class="stat-box"><div class="stat-label">حرکت</div><div class="stat-value" id="moveCount">۰</div></div>
            <div class="stat-box"><div class="stat-label">زمان</div><div class="stat-value" id="timer">۰:۰۰</div></div>
            <div class="stat-box"><div class="stat-label">بهترین</div><div class="stat-value" id="bestScore">-</div></div>
        </div>
        <div class="card-grid grid-5x4" id="cardGrid"></div>
        <div class="game-controls">
            <button class="control-btn" id="newGameBtn">🔄 بازی جدید</button>
            <button class="control-btn" id="muteBtn">🔊 صدا</button>
        </div>
    </div>
    <div class="win-overlay" id="winOverlay">
        <div class="win-title" id="winTitle">بردی!</div>
        <div class="win-stats" id="winStats"></div>
        <button class="win-btn" id="winNewGame">بازی دوباره</button>
    </div>
    <footer>🔒 بهترین رکورد شما در مرورگر ذخیره می‌شود · حالت دو نفره با امتیازدهی · صدا و ویبره</footer>
</div>

<script>
    (function(){
        // آیکون‌های ابزارها (کوتاه شده برای فشردگی)
        const ICON_POOL = [
            { name: "دیکشنری", svg: '<path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>' },
            { name: "برش تصویر", svg: '<path d="M3 17V5h12M21 7v12H9"/>' },
            { name: "کاهش حجم عکس", svg: '<path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>' },
            { name: "نقاشی آنلاین", svg: '<path d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42"/>' },
            { name: "تایمر", svg: '<path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>' },
            { name: "ساخت رمز", svg: '<path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>' }
        ];
        // کپی ساده از همان منطق بازی حافظه اصلی (با کاهش حجم)
        function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
        let difficulty = 'easy', gameMode = '2p', moves = 0, matched = 0, totalPairs = 10, timerSeconds = 0, timerInt = null, firstCard=null, secondCard=null, locked=false;
        let currentPlayer=1, p1Score=0, p2Score=0;
        const DIFF = { easy:{cols:4,rows:3,pairs:6}, medium:{cols:4,rows:4,pairs:8}, hard:{cols:5,rows:4,pairs:10} };
        let cards = [];
        function initGame(){
            const cfg = DIFF[difficulty];
            totalPairs = cfg.pairs;
            matched = 0; moves = 0; firstCard=null; secondCard=null; locked=false; if(timerInt) clearInterval(timerInt); timerSeconds=0;
            p1Score=0; p2Score=0; currentPlayer=1;
            updateUI();
            let selected = shuffle([...ICON_POOL]).slice(0,totalPairs);
            let deck = [];
            selected.forEach((item,idx)=>{
                for(let i=0;i<2;i++) deck.push({id:idx, name:item.name, svg:item.svg});
            });
            deck = shuffle(deck);
            const grid = document.getElementById('cardGrid');
            grid.className = `card-grid grid-${cfg.cols}x${cfg.rows}`;
            grid.innerHTML = '';
            deck.forEach((c,i)=>{
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.id = i;
                card.dataset.pairId = c.id;
                card.innerHTML = `<div class="card-back"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg></div><div class="card-front"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">${c.svg}</svg><div class="card-name">${c.name}</div></div>`;
                card.onclick = () => onCardClick(card);
                grid.appendChild(card);
            });
            // preview
            locked=true;
            document.querySelectorAll('.memory-card').forEach(c=>c.classList.add('flipped'));
            setTimeout(()=>{ document.querySelectorAll('.memory-card').forEach(c=>c.classList.remove('flipped')); locked=false; }, 2000);
        }
        function updateUI(){
            document.getElementById('pairsCount').innerText = matched+'/'+totalPairs;
            document.getElementById('moveCount').innerText = moves;
            document.getElementById('timer').innerText = Math.floor(timerSeconds/60)+':'+String(timerSeconds%60).padStart(2,'0');
            document.getElementById('player1Score').innerText = p1Score+'/'+totalPairs;
            document.getElementById('player2Score').innerText = p2Score+'/'+totalPairs;
            document.getElementById('player1Box').classList.toggle('active-turn', currentPlayer===1);
            document.getElementById('player2Box').classList.toggle('active-turn', currentPlayer===2);
            if(gameMode==='1p') document.getElementById('playersBar').classList.remove('show');
            else document.getElementById('playersBar').classList.add('show');
        }
        function onCardClick(card){
            if(locked) return;
            if(card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if(!timerInt && matched===0) timerInt = setInterval(()=>{ timerSeconds++; updateUI(); },1000);
            card.classList.add('flipped');
            if(!firstCard){ firstCard=card; return; }
            secondCard=card;
            moves++; updateUI();
            locked=true;
            if(firstCard.dataset.pairId === secondCard.dataset.pairId){
                setTimeout(()=>{
                    firstCard.classList.add('matched');
                    secondCard.classList.add('matched');
                    matched++;
                    updateUI();
                    if(gameMode==='2p'){
                        if(currentPlayer===1) p1Score++; else p2Score++;
                        updateUI();
                    }
                    resetTurn();
                    if(matched===totalPairs) endGame();
                },300);
            } else {
                setTimeout(()=>{
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    if(gameMode==='2p'){ currentPlayer = currentPlayer===1?2:1; updateUI(); }
                    resetTurn();
                },600);
            }
        }
        function resetTurn(){ firstCard=null; secondCard=null; locked=false; }
        function endGame(){
            if(timerInt) clearInterval(timerInt);
            let msg = gameMode==='1p' ? `شما بردید! ${moves} حرکت` : (p1Score>p2Score?'بازیکن ۱ برنده!':'بازیکن ۲ برنده!');
            document.getElementById('winTitle').innerText = msg;
            document.getElementById('winStats').innerText = `زمان: ${Math.floor(timerSeconds/60)}:${String(timerSeconds%60).padStart(2,'0')}`;
            document.getElementById('winOverlay').classList.add('show');
        }
        document.getElementById('newGameBtn').onclick = ()=>{ if(timerInt) clearInterval(timerInt); initGame(); document.getElementById('winOverlay').classList.remove('show'); };
        document.getElementById('winNewGame').onclick = ()=>{ document.getElementById('newGameBtn').click(); };
        document.querySelectorAll('.mode-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); gameMode=btn.dataset.mode; initGame(); }; });
        document.querySelectorAll('.diff-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); difficulty=btn.dataset.diff; initGame(); }; });
        let muted=false;
        document.getElementById('muteBtn').onclick = ()=>{ muted=!muted; document.getElementById('muteBtn').innerHTML = muted?'🔇 صدا':'🔊 صدا'; };
        initGame();
    })();
</script>
</body>
</html>
